<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Miraiyahu | 無妄之境</title>
    <style>
        body {
            /* 廢土色調：乾燥的泥土與枯萎的草 */
            background: linear-gradient(135deg, #2c2416 0%, #3d3522 100%);
            color: #a69f88; /* 蘆葦色 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "Noto Serif SC", serif;
            overflow: hidden;
        }

        /* 營造迷離感的濾鏡層 */
        .mist {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 20%, #2c2416 80%);
            pointer-events: none;
            backdrop-filter: blur(1.5px); /* 輕微模糊，產生迷離感 */
        }

        .content {
            z-index: 10;
            text-align: center;
            animation: sway 6s ease-in-out infinite; /* 像蘆葦一樣輕微晃動 */
        }

        h1 {
            font-weight: 200;
            font-size: 1.5rem;
            letter-spacing: 0.5rem;
            opacity: 0.8;
            text-shadow: 0 0 10px rgba(166, 159, 136, 0.3);
        }

        .domain {
            font-size: 0.7rem;
            color: #5d5442;
            margin-top: 40px;
            letter-spacing: 2px;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-0.5deg) translateY(0); }
            50% { transform: rotate(0.5deg) translateY(-5px); }
        }
    </style>
</head>
<body>
    <div class="mist"></div>
    <div class="content">
        <h1>我在等一場無妄的等待。</h1>
        <div class="domain">MIRAIYAHU.ICU</div>
    </div>
</body>
</html>
