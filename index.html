<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Miraiyahu | 無妄之境</title>
    <style>
        /* 定義鼠標坐標變量 */
        :root {
            --x: 50%;
            --y: 50%;
        }

        body {
            /* 廢土土色與乾草色基底 */
            background-color: #2c2416;
            color: #a69f88; /* 蘆葦乾草色 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: serif;
            overflow: hidden;
            position: relative;
        }

        /* 噪點背景濾鏡，增強迷幻感 */
        .noise-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(135deg, transparent 0%, rgba(10, 10, 10, 0.1) 100%);
            pointer-events: none;
            filter: contrast(150%) brightness(150%) invert(0) sepia(20%);
            opacity: 0.1; /* 輕微噪點 */
        }

        /* 迷離的土色迷霧層 */
        .mist-soil {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 20%, #2c2416 80%);
            pointer-events: none;
            backdrop-filter: blur(2px);
            opacity: 0.7;
        }

        /* 交互式的荒原綠色層（跟隨鼠標） */
        .mist-green {
            position: absolute;
            width: 100%;
            height: 100%;
            /* 毒草綠 (#495945) 的交互光影 */
            background: radial-gradient(circle at var(--x) var(--y), rgba(73, 89, 69, 0.4) 0%, transparent 60%);
            pointer-events: none;
            mix-blend-mode: saturation; /* 讓顏色混合產生幻覺感 */
        }

        .content {
            z-index: 10;
            text-align: center;
            animation: sway 6s ease-in-out infinite;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 0.5rem;
            opacity: 0.8;
            text-shadow: 0 0 10px rgba(166, 159, 136, 0.3);
        }

        /* 蘆葦搖曳的輕微動態 */
        @keyframes sway {
            0%, 100% { transform: rotate(-0.5deg) translateY(0); }
            50% { transform: rotate(0.5deg) translateY(-5px); }
        }
    </style>
    <script>
        // 獲取鼠標位置並更新 CSS 變量
        document.addEventListener('mousemove', (e) => {
            const body = document.body;
            const x = (e.clientX / body.clientWidth * 100) + '%';
            const y = (e.clientY / body.clientHeight * 100) + '%';
            document.documentElement.style.setProperty('--x', x);
            document.documentElement.style.setProperty('--y', y);
        });
    </script>
</head>
<body>
    <div class="noise-overlay"></div>
    <div class="mist-soil"></div>
    <div class="mist-green"></div> <div class="content">
        <h1>我在等一場無妄的等待。</h1>
    </div>
</body>
</html>
