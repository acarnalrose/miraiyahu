<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>Miraiyahu | 無妄之境</title>
    <style>
        /* 定義鼠標坐標變量 */
        :root {
            --x: 50%;
            --y: 50%;
        }

        body {
            /* 廢土土色與乾草色基底 */
            background-color: #2c2416;
            color: #a69f88;
            /* 蘆葦乾草色 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: serif;
            overflow: hidden;
            position: relative;
        }

        /* 噪點背景濾鏡，增強迷幻感 */
        .noise-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: repeating-radial-gradient(circle at center, rgba(10, 10, 10, 0.2) 0, transparent 2px);
            pointer-events: none;
            filter: contrast(150%) brightness(120%) sepia(30%);
            opacity: 0.3;
            animation: pulse-noise 4s infinite alternate;
        }

        /* 迷離的土色迷霧層 */
        .mist-soil {
            position: absolute;
            width: 200%;
            height: 200%;
            left: -50%;
            top: -50%;
            background: radial-gradient(circle, transparent 10%, #2c2416 80%),
                conic-gradient(from 0deg at 50% 50%, rgba(73, 89, 69, 0.3), #2c2416, rgba(100, 50, 40, 0.4), #2c2416, rgba(73, 89, 69, 0.3));
            pointer-events: none;
            backdrop-filter: blur(5px);
            opacity: 0.8;
            animation: drift-mist 25s ease-in-out infinite alternate;
        }

        /* 交互式的荒原綠色層（跟隨鼠標） */
        .mist-green {
            position: absolute;
            width: 100%;
            height: 100%;
            /* 毒草綠 (#495945) 的交互光影 */
            background: radial-gradient(circle at var(--x) var(--y), rgba(73, 89, 69, 0.4) 0%, transparent 60%);
            pointer-events: none;
            mix-blend-mode: saturation;
            /* 讓顏色混合產生幻覺感 */
        }

        .content {
            z-index: 10;
            text-align: center;
            animation: sway 6s ease-in-out infinite;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 0.5rem;
            opacity: 0.8;
            text-shadow: 0 0 10px rgba(166, 159, 136, 0.3);
        }

        /* 蘆葦搖曳的輕微動態 */
        @keyframes sway {

            0%,
            100% {
                transform: rotate(-0.5deg) translateY(0);
            }

            50% {
                transform: rotate(0.5deg) translateY(-5px);
            }
        }

        @keyframes pulse-noise {
            0% {
                filter: contrast(150%) brightness(120%) sepia(30%) hue-rotate(0deg);
                opacity: 0.2;
            }

            100% {
                filter: contrast(220%) brightness(150%) sepia(80%) hue-rotate(60deg);
                opacity: 0.5;
            }
        }

        @keyframes drift-mist {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(2%, 3%) scale(1.05);
            }

            100% {
                transform: translate(-3%, -2%) scale(1.02);
            }
        }

        .buttons {
            margin-top: 3rem;
            display: flex;
            gap: 2rem;
            justify-content: center;
        }

        .btn {
            background: linear-gradient(135deg, #495945 0%, #2c2416 100%);
            color: #d1ccb8;
            border: 2px outset #7a8c73;
            border-bottom: 2px solid #1a150d;
            border-right: 2px solid #1a150d;
            padding: 0.8rem 2rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 0.1rem;
            text-decoration: none;
            text-shadow: 0 0 5px rgba(209, 204, 184, 0.8);
            transition: all 0.1s ease;
            cursor: pointer;
            box-shadow: inset 1px 1px 5px rgba(122, 140, 115, 0.5), 2px 2px 10px rgba(0, 0, 0, 0.8);
            border-radius: 2px;
        }

        .btn:hover {
            background: linear-gradient(135deg, #5c6e57 0%, #3d3220 100%);
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 1);
        }

        .btn:active {
            border: 2px inset #1a150d;
            border-bottom: 2px solid #7a8c73;
            border-right: 2px solid #7a8c73;
            box-shadow: inset 2px 2px 6px rgba(0, 0, 0, 0.8);
            transform: translate(1px, 1px);
        }
    </style>
    <script>
        // 獲取鼠標位置並更新 CSS 變量
        document.addEventListener('mousemove', (e) => {
            const body = document.body;
            const x = (e.clientX / body.clientWidth * 100) + '%';
            const y = (e.clientY / body.clientHeight * 100) + '%';
            document.documentElement.style.setProperty('--x', x);
            document.documentElement.style.setProperty('--y', y);
        });
    </script>
</head>

<body>
    <div class="noise-overlay"></div>
    <div class="mist-soil"></div>
    <div class="mist-green"></div>
    <div class="content">
        <h1>我在等一場無妄的等待。</h1>
        <div class="buttons">
            <a href="#" class="btn">現實世界</a>
            <a href="#" class="btn">WIRED</a>
        </div>
    </div>
</body>

</html>
