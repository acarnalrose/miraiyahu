<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>Miraiyahu | WIRED</title>
    <style>
        :root {
            --x: 50%;
            --y: 50%;
        }

        body {
            /* 廢土土色與乾草色基底 */
            background-color: #1a1510;
            color: #d1ccb8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            position: relative;
        }

        /* 背景圖 */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('wired-bg.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.6;
            z-index: 1;
            /* 加上 Sepia 和高對比度來增強電線桿的鐵鏽感 */
            filter: sepia(50%) contrast(120%) brightness(80%);
            pointer-events: none;
        }

        /* 噪點背景濾鏡，增強迷幻感 */
        .noise-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: repeating-radial-gradient(circle at center, rgba(10, 10, 10, 0.2) 0, transparent 2px);
            pointer-events: none;
            filter: contrast(150%) brightness(120%) sepia(30%);
            opacity: 0.4;
            animation: pulse-noise 4s infinite alternate;
            z-index: 2;
        }

        @keyframes pulse-noise {
            0% {
                filter: contrast(150%) brightness(120%) sepia(30%) hue-rotate(0deg);
                opacity: 0.3;
            }

            100% {
                filter: contrast(220%) brightness(150%) sepia(80%) hue-rotate(20deg);
                opacity: 0.6;
            }
        }

        /* 掃描線效果 (Scanlines) */
        .scanlines {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(20, 20, 20, 0.3) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
        }

        /* 全螢幕科技感邊框 (CRT Bezel & Vignette) */
        .frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.9),
                inset 0 0 20px rgba(255, 255, 255, 0.1),
                inset 0 0 3px rgba(100, 100, 100, 0.5);
            border: 2px solid rgba(50, 50, 50, 0.8);
            box-sizing: border-box;
        }

        /* 歡迎畫面序列 */
        #welcome-sequence {
            position: absolute;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            animation: fadeOutSequence 6s forwards;
        }

        #welcome-sequence h1 {
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: 0.5rem;
            margin-bottom: 2rem;
            font-family: serif;
            text-shadow: 0 0 15px rgba(209, 204, 184, 0.8);
            color: #d1ccb8;
        }

        #welcome-sequence p {
            font-size: 1.2rem;
            letter-spacing: 0.2rem;
            color: #d1ccb8;
            opacity: 0.9;
        }

        @keyframes fadeOutSequence {

            0%,
            70% {
                opacity: 1;
                visibility: visible;
            }

            100% {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* 最終停留的作品分類畫面 */
        .portfolio-screen {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            width: 80%;
            max-width: 900px;
            position: absolute;
            left: 10%;
            top: 50%;
            transform: translateY(-50%) !important;
            /* Overridden by animation later but starting point is good */
            opacity: 0;
            animation: fadeInPortfolio 3s ease forwards;
            animation-delay: 5s;
            /* Wait for welcome to fade */
        }

        @keyframes fadeInPortfolio {
            0% {
                opacity: 0;
                transform: translateY(-40%);
            }

            100% {
                opacity: 1;
                transform: translateY(-50%);
            }
        }

        /* 作品分類網格 */
        .portfolio-grid {
            display: grid;
            grid-template-columns: 1fr;
            /* 單列豎排 */
            gap: 1.5rem;
            width: 300px;
            /* 固定一個適合的寬度 */
            margin-bottom: 3rem;
        }

        .category-link {
            background: rgba(0, 0, 0, 0.4);
            border: 1px inset #3a3228;
            padding: 2rem 1rem;
            color: #d1ccb8;
            text-decoration: none;
            font-size: 1.3rem;
            letter-spacing: 0.3rem;
            font-family: serif;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
            justify-content: flex-start;
            /* 讓文字靠左對齊，更有目錄感 */
            padding-left: 2rem;
        }

        .category-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(209, 204, 184, 0.1), transparent);
            transform: skewX(-20deg);
            transition: left 0.5s ease;
        }

        .category-link:hover {
            background: rgba(44, 54, 39, 0.4);
            /* 微微透出廢土綠 */
            border-color: #6b5c4d;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(209, 204, 184, 0.2);
        }

        .category-link:hover::before {
            left: 150%;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            height: 3.5rem;
            min-width: 11rem;
            background: linear-gradient(135deg, #495945 0%, #2c2416 100%);
            color: #d1ccb8;
            border: 2px outset #7a8c73;
            border-bottom: 2px solid #1a150d;
            border-right: 2px solid #1a150d;
            padding: 0 2rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 0.2rem;
            text-decoration: none;
            text-shadow: 0 0 5px rgba(209, 204, 184, 0.8);
            transition: all 0.1s ease;
            cursor: pointer;
            box-shadow: inset 1px 1px 5px rgba(122, 140, 115, 0.5), 2px 2px 10px rgba(0, 0, 0, 0.8);
            border-radius: 2px;
        }

        .btn:hover {
            background: linear-gradient(135deg, #5c6e57 0%, #3d3220 100%);
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 1);
        }

        .btn:active {
            border: 2px inset #1a150d;
            border-bottom: 2px solid #7a8c73;
            border-right: 2px solid #7a8c73;
            box-shadow: inset 2px 2px 6px rgba(0, 0, 0, 0.8);
            transform: translate(1px, 1px);
        }

        /* 游標微光互動 */
        .cursor-light {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle at var(--x) var(--y), rgba(209, 204, 184, 0.15) 0%, transparent 50%);
            pointer-events: none;
            mix-blend-mode: overlay;
            z-index: 3;
            top: 0;
            left: 0;
        }
    </style>
</head>

<body>
    <div class="bg-image"></div>
    <div class="cursor-light"></div>
    <div class="noise-overlay"></div>
    <div class="scanlines"></div>
    <div class="frame"></div>

    <div id="welcome-sequence">
        <h1>Welcome to the Wired.</h1>
        <p>No matter where you are... everyone is always connected.</p>
    </div>

    <div class="portfolio-screen">
        <div class="portfolio-grid">
            <a href="fiction.html" class="category-link">小說</a>
            <a href="#" class="category-link">站街日記</a>
            <a href="#" class="category-link">詩歌隨筆</a>
            <a href="#" class="category-link">畫</a>
        </div>
    </div>

    <div class="buttons" style="position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 60; margin: 0;">
        <a href="index.html" class="btn">返回現實世界</a>
    </div>

    <script>
        document.addEventListener('mousemove', (e) => {
            const body = document.body;
            const x = (e.clientX / body.clientWidth * 100) + '%';
            const y = (e.clientY / body.clientHeight * 100) + '%';
            document.documentElement.style.setProperty('--x', x);
            document.documentElement.style.setProperty('--y', y);
        });
    </script>
</body>

</html>
