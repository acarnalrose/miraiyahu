<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>Miraiyahu | WIRED</title>
    <style>
        :root {
            --x: 50%;
            --y: 50%;
        }

        body {
            /* 廢土土色與乾草色基底 */
            background-color: #1a1510;
            color: #d1ccb8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            position: relative;
        }

        /* 背景圖 */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('wired-bg.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.6;
            z-index: 1;
            /* 加上 Sepia 和高對比度來增強電線桿的鐵鏽感 */
            filter: sepia(50%) contrast(120%) brightness(80%);
            pointer-events: none;
        }

        /* 噪點背景濾鏡，增強迷幻感 */
        .noise-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: repeating-radial-gradient(circle at center, rgba(10, 10, 10, 0.2) 0, transparent 2px);
            pointer-events: none;
            filter: contrast(150%) brightness(120%) sepia(30%);
            opacity: 0.4;
            animation: pulse-noise 4s infinite alternate;
            z-index: 2;
        }

        @keyframes pulse-noise {
            0% {
                filter: contrast(150%) brightness(120%) sepia(30%) hue-rotate(0deg);
                opacity: 0.3;
            }

            100% {
                filter: contrast(220%) brightness(150%) sepia(80%) hue-rotate(20deg);
                opacity: 0.6;
            }
        }

        /* 掃描線效果 (Scanlines) */
        .scanlines {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(20, 20, 20, 0.3) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
        }

        /* 全螢幕科技感邊框 (CRT Bezel & Vignette) */
        .frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.9),
                inset 0 0 20px rgba(255, 255, 255, 0.1),
                inset 0 0 3px rgba(100, 100, 100, 0.5);
            border: 2px solid rgba(50, 50, 50, 0.8);
            box-sizing: border-box;
        }

        .content {
            z-index: 10;
            text-align: center;
            background: rgba(10, 8, 5, 0.8);
            padding: 3rem;
            border: 2px outset #6b5c4d;
            border-bottom: 2px solid #0f0d0a;
            border-right: 2px solid #0f0d0a;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            max-width: 600px;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 0.5rem;
            opacity: 0.9;
            text-shadow: 0 0 10px rgba(209, 204, 184, 0.5);
            margin-bottom: 2rem;
            font-family: serif;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 2rem;
            letter-spacing: 0.1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            height: 3.5rem;
            min-width: 11rem;
            background: linear-gradient(135deg, #495945 0%, #2c2416 100%);
            color: #d1ccb8;
            border: 2px outset #7a8c73;
            border-bottom: 2px solid #1a150d;
            border-right: 2px solid #1a150d;
            padding: 0 2rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 0.2rem;
            text-decoration: none;
            text-shadow: 0 0 5px rgba(209, 204, 184, 0.8);
            transition: all 0.1s ease;
            cursor: pointer;
            box-shadow: inset 1px 1px 5px rgba(122, 140, 115, 0.5), 2px 2px 10px rgba(0, 0, 0, 0.8);
            border-radius: 2px;
        }

        .btn:hover {
            background: linear-gradient(135deg, #5c6e57 0%, #3d3220 100%);
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 1);
        }

        .btn:active {
            border: 2px inset #1a150d;
            border-bottom: 2px solid #7a8c73;
            border-right: 2px solid #7a8c73;
            box-shadow: inset 2px 2px 6px rgba(0, 0, 0, 0.8);
            transform: translate(1px, 1px);
        }

        /* 游標微光互動 */
        .cursor-light {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle at var(--x) var(--y), rgba(209, 204, 184, 0.15) 0%, transparent 50%);
            pointer-events: none;
            mix-blend-mode: overlay;
            z-index: 3;
            top: 0;
            left: 0;
        }
    </style>
</head>

<body>
    <div class="bg-image"></div>
    <div class="cursor-light"></div>
    <div class="noise-overlay"></div>
    <div class="scanlines"></div>
    <div class="frame"></div>

    <div class="content">
        <h1>Welcome to the Wired.</h1>
        <p>No matter where you are... everyone is always connected.</p>
        <div class="buttons">
            <a href="index.html" class="btn">返回現實世界</a>
        </div>
    </div>

    <script>
        document.addEventListener('mousemove', (e) => {
            const body = document.body;
            const x = (e.clientX / body.clientWidth * 100) + '%';
            const y = (e.clientY / body.clientHeight * 100) + '%';
            document.documentElement.style.setProperty('--x', x);
            document.documentElement.style.setProperty('--y', y);
        });
    </script>
</body>

</html>
