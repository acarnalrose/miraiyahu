<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>Miraiyahu | WIRED</title>
    <style>
        :root {
            --x: 50%;
            --y: 50%;
        }

        body {
            background-color: #1a1510;
            color: #d1ccb8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            position: relative;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('wired-bg.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.6;
            z-index: 1;
            filter: sepia(50%) contrast(120%) brightness(80%);
            pointer-events: none;
        }

        .noise-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: repeating-radial-gradient(circle at center, rgba(10, 10, 10, 0.2) 0, transparent 2px);
            pointer-events: none;
            filter: contrast(150%) brightness(120%) sepia(30%);
            opacity: 0.4;
            animation: pulse-noise 4s infinite alternate;
            z-index: 2;
        }

        @keyframes pulse-noise {
            0% {
                filter: contrast(150%) brightness(120%) sepia(30%) hue-rotate(0deg);
                opacity: 0.3;
            }

            100% {
                filter: contrast(220%) brightness(150%) sepia(80%) hue-rotate(20deg);
                opacity: 0.6;
            }
        }

        .scanlines {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(20, 20, 20, 0.3) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
        }

        .frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.9),
                inset 0 0 20px rgba(255, 255, 255, 0.1),
                inset 0 0 3px rgba(100, 100, 100, 0.5);
            border: 2px solid rgba(50, 50, 50, 0.8);
            box-sizing: border-box;
        }

        #welcome-sequence {
            position: absolute;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            animation: fadeOutSequence 2.5s forwards;
        }

        #welcome-sequence h1 {
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: 0.5rem;
            margin-bottom: 2rem;
            font-family: serif;
            text-shadow: 0 0 15px rgba(209, 204, 184, 0.8);
            color: #d1ccb8;
        }

        #welcome-sequence p {
            font-size: 1.2rem;
            letter-spacing: 0.2rem;
            color: #d1ccb8;
            opacity: 0.9;
        }

        @keyframes fadeOutSequence {

            0%,
            50% {
                opacity: 1;
                visibility: visible;
            }

            100% {
                opacity: 0;
                visibility: hidden;
            }
        }

        .portfolio-screen {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            width: 80%;
            max-width: 900px;
            position: absolute;
            left: 10%;
            top: 50%;
            transform: translateY(-50%) !important;
            opacity: 0;
            animation: fadeInPortfolio 1s ease forwards;
            animation-delay: 2.5s;
        }

        @keyframes fadeInPortfolio {
            0% {
                opacity: 0;
                transform: translateY(-40%);
            }

            100% {
                opacity: 1;
                transform: translateY(-50%);
            }
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            width: 300px;
            margin-bottom: 3rem;
        }

        .category-link {
            background: rgba(0, 0, 0, 0.4);
            border: 1px inset #3a3228;
            padding: 2rem 1rem;
            color: #d1ccb8;
            text-decoration: none;
            font-size: 1.3rem;
            letter-spacing: 0.3rem;
            font-family: serif;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding-left: 2rem;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .category-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(209, 204, 184, 0.1), transparent);
            transform: skewX(-20deg);
            transition: left 0.5s ease;
        }

        .category-link:hover {
            background: rgba(44, 54, 39, 0.4);
            border-color: #6b5c4d;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(209, 204, 184, 0.2);
        }

        .category-link:hover::before {
            left: 150%;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            height: 3.5rem;
            min-width: 11rem;
            background: linear-gradient(135deg, #495945 0%, #2c2416 100%);
            color: #d1ccb8;
            border: 2px outset #7a8c73;
            border-bottom: 2px solid #1a150d;
            border-right: 2px solid #1a150d;
            padding: 0 2rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 0.2rem;
            text-decoration: none;
            text-shadow: 0 0 5px rgba(209, 204, 184, 0.8);
            transition: all 0.05s ease;
            cursor: pointer;
            box-shadow: inset 1px 1px 5px rgba(122, 140, 115, 0.5), 2px 2px 10px rgba(0, 0, 0, 0.8);
            border-radius: 2px;
        }

        .btn:hover {
            background: linear-gradient(135deg, #5c6e57 0%, #3d3220 100%);
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 1);
        }

        .btn:active {
            border: 2px inset #1a150d;
            border-bottom: 2px solid #7a8c73;
            border-right: 2px solid #7a8c73;
            box-shadow: inset 2px 2px 6px rgba(0, 0, 0, 0.8);
            transform: translate(1px, 1px);
        }

        .cursor-light {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle at var(--x) var(--y), rgba(209, 204, 184, 0.15) 0%, transparent 50%);
            pointer-events: none;
            mix-blend-mode: overlay;
            z-index: 3;
            top: 0;
            left: 0;
        }

        /* 留言板 BBS 樣式 */
        .bbs-screen {
            z-index: 100;
            display: none;
            flex-direction: column;
            width: 80%;
            height: 70%;
            max-width: 900px;
            position: absolute;
            left: 10%;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(10, 8, 5, 0.95);
            border: 2px solid #d1ccb8;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(209, 204, 184, 0.1);
            backdrop-filter: blur(15px);
            padding: 2rem;
            animation: terminalBoot 0.4s steps(4) forwards;
        }

        @keyframes terminalBoot {
            0% {
                opacity: 0;
                transform: translateY(-50%) scaleY(0.01);
            }

            100% {
                opacity: 1;
                transform: translateY(-50%) scaleY(1);
            }
        }

        .bbs-header {
            border-bottom: 1px double #d1ccb8;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bbs-header h2 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 0.3rem;
            color: #8c7e6b;
            text-shadow: 0 0 10px rgba(209, 204, 184, 0.3);
        }

        .bbs-messages {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid rgba(140, 126, 107, 0.3);
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message-item {
            border-left: 3px solid #495945;
            padding-left: 1rem;
            animation: textAppear 0.3s ease-out;
            position: relative;
        }

        @keyframes textAppear {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .msg-dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 12px;
            height: 12px;
            background: #d1ccb8;
            border: 1px solid #495945;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 10px rgba(209, 204, 184, 0.5);
            z-index: 5;
            animation: pulse-dot 2s infinite alternate;
        }

        @keyframes pulse-dot {
            0% {
                box-shadow: 0 0 5px rgba(209, 204, 184, 0.4);
                filter: brightness(1);
            }

            100% {
                box-shadow: 0 0 15px rgba(209, 204, 184, 1);
                filter: brightness(1.2);
            }
        }

        .msg-dot:hover {
            transform: scale(1.4);
            background: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        .msg-controls {
            position: absolute;
            top: 25px;
            right: 0;
            background: rgba(26, 21, 16, 0.95);
            border: 1px solid #d1ccb8;
            padding: 0.5rem;
            display: none;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 110;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: #8c7e6b;
            font-family: inherit;
            font-size: 0.75rem;
            cursor: pointer;
            text-align: left;
            padding: 0.2rem 0.5rem;
        }

        .ctrl-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        .message-meta {
            font-size: 0.8rem;
            color: #8c7e6b;
            margin-bottom: 0.5rem;
            display: flex;
            gap: 1rem;
        }

        .message-content {
            font-size: 1rem;
            line-height: 1.6;
            color: #d1ccb8;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .edit-area {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #d1ccb8;
            color: #d1ccb8;
            font-family: inherit;
            padding: 0.5rem;
            margin-top: 0.5rem;
            box-sizing: border-box;
        }

        .bbs-footer {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .input-row {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .bbs-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #6b5c4d;
            color: #d1ccb8;
            padding: 0.8rem;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .bbs-input:focus {
            outline: none;
            border-color: #d1ccb8;
        }

        textarea.bbs-input {
            width: 100%;
            height: 80px;
            resize: none;
            box-sizing: border-box;
        }

        .anon-label {
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .bbs-close {
            background: none;
            border: 1px solid #8c7e6b;
            color: #8c7e6b;
            cursor: pointer;
            padding: 0.2rem 0.5rem;
        }

        .bbs-messages::-webkit-scrollbar {
            width: 6px;
        }

        .bbs-messages::-webkit-scrollbar-thumb {
            background: #3a3228;
        }

        /* --- Art Gallery Styles --- */
        .art-screen {
            z-index: 100;
            display: none;
            flex-direction: column;
            width: 90%;
            height: 85%;
            max-width: 1200px;
            position: absolute;
            left: 5%;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(10, 8, 5, 0.92);
            border: 1px solid rgba(209, 204, 184, 0.2);
            backdrop-filter: blur(25px);
            padding: 2rem;
            animation: fadeInPortfolio 0.6s ease forwards;
            overflow: hidden;
        }

        .art-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2.5rem;
            overflow-y: auto;
            padding: 2rem;
            flex-grow: 1;
            perspective: 1500px;
        }

        .art-item {
            position: relative;
            background: rgba(40, 35, 30, 0.3);
            border: 1px solid rgba(209, 204, 184, 0.1);
            padding: 12px;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            opacity: 0;
            animation: art-fade-in 0.8s ease forwards;
        }

        @keyframes art-fade-in {
            from { opacity: 0; transform: translateY(30px) rotateX(-10deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        .art-item:hover {
            transform: translateZ(50px) translateY(-10px);
            border-color: rgba(209, 204, 184, 0.5);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.9);
            background: rgba(44, 54, 39, 0.2);
        }

        .art-item img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            filter: sepia(40%) contrast(105%) brightness(90%);
            transition: all 0.6s ease;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .art-item:hover img {
            filter: sepia(0%) contrast(115%) brightness(110%);
        }

        /* --- Lightbox Styles --- */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(5, 5, 5, 0.98);
            z-index: 500;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(15px);
            cursor: zoom-out;
        }

        .lightbox-img {
            max-width: 85%;
            max-height: 85%;
            box-shadow: 0 0 100px rgba(0, 0, 0, 1);
            border: 1px solid rgba(209, 204, 184, 0.15);
            animation: blur-focus-reveal 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes blur-focus-reveal {
            0% { opacity: 0; filter: blur(20px) brightness(200%); transform: scale(0.95); }
            100% { opacity: 1; filter: blur(0) brightness(100%); transform: scale(1); }
        }

        .lightbox-close {
            position: absolute;
            top: 2rem;
            right: 2rem;
            color: rgba(209, 204, 184, 0.5);
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            border: 1px solid rgba(209, 204, 184, 0.2);
            padding: 5px 15px;
            background: rgba(0, 0, 0, 0.5);
            transition: all 0.3s;
            z-index: 600;
        }

        .lightbox-close:hover {
            color: #fff;
            border-color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(209, 204, 184, 0.2);
            color: rgba(209, 204, 184, 0.5);
            font-size: 2rem;
            padding: 2rem 1rem;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: serif;
            user-select: none;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-color: rgba(209, 204, 184, 0.8);
            box-shadow: 0 0 20px rgba(209, 204, 184, 0.2);
        }

        .nav-btn.prev { left: 2rem; }
        .nav-btn.next { right: 2rem; }

        .art-grid::-webkit-scrollbar {
            width: 6px;
        }
        .art-grid::-webkit-scrollbar-thumb {
            background: #3a3228;
        }
    </style>
</head>

<body>
    <div class="bg-image"></div>
    <div class="cursor-light"></div>
    <div class="noise-overlay"></div>
    <div class="scanlines"></div>
    <div class="frame"></div>

    <div id="welcome-sequence">
        <h1>Welcome to the Wired.</h1>
        <p>No matter where you are... everyone is always connected.</p>
    </div>

    <div class="portfolio-screen">
        <div class="portfolio-grid">
            <a href="fiction.html" class="category-link">小說</a>
            <a href="diary.html" class="category-link">站街日記</a>
            <a href="poetry.html" class="category-link">詩歌隨筆</a>
            <a href="javascript:void(0)" class="category-link" onclick="toggleArt(true)">畫</a>
            <a href="javascript:void(0)" class="category-link" onclick="toggleBBS(true)">留言板 (BBS)</a>
        </div>
    </div>

    <div class="bbs-screen" id="bbs-screen">
        <div class="bbs-header">
            <h2>CONNECTED_BBS / 留言板</h2>
            <button class="bbs-close" onclick="toggleBBS(false)">[ DISCONNECT ]</button>
        </div>
        <div class="bbs-messages" id="bbs-messages"></div>
        <div class="bbs-footer">
            <div class="input-row">
                <input type="text" id="bbs-name" class="bbs-input" placeholder="NAME..." style="width: 150px;">
                <label class="anon-label">
                    <input type="checkbox" id="bbs-anon" onchange="handleAnon(this)"> 匿名
                </label>
            </div>
            <textarea id="bbs-content" class="bbs-input" placeholder="Enter message here..."></textarea>
            <div style="display: flex; justify-content: flex-end;">
                <button class="btn" style="min-width: 8rem; height: 2.5rem; font-size: 1rem;"
                    onclick="postMessage()">CONNECT</button>
            </div>
        </div>
    </div>

    <div class="art-screen" id="art-screen">
        <div class="bbs-header">
            <h2>ARTIFACT_GALLERY / 畫</h2>
            <button class="bbs-close" onclick="toggleArt(false)">[ TERMINATE_GALLERY ]</button>
        </div>
        <div class="art-grid" id="art-grid">
            <!-- Images will be populated here by JS -->
        </div>
    </div>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox(event)">[ DISCONNECT_VIEW ]</button>
        <div class="nav-btn prev" onclick="navigateArt(event, -1)">‹</div>
        <div class="nav-btn next" onclick="navigateArt(event, 1)">›</div>
        <img class="lightbox-img" id="lightbox-img" src="" alt="artwork" onclick="event.stopPropagation()">
    </div>

    <div class="buttons" style="position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 60; margin: 0;">
        <a href="index.html" class="btn">返回現實世界</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth * 100) + '%';
            const y = (e.clientY / window.innerHeight * 100) + '%';
            document.documentElement.style.setProperty('--x', x);
            document.documentElement.style.setProperty('--y', y);
        });

        // --- Supabase Configuration ---
        const SUPABASE_URL = 'https://nrwphcveqpjaxhzlkkbk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yd3BoY3ZlcXBqYXhoemxra2JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNzAwODUsImV4cCI6MjA4ODg0NjA4NX0.F5-cZwTKixNMz76ecDEhHAy5CRbhSHtGpiChjzeubLY';

        let _supabase;
        try {
            _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (e) {
            console.error("Supabase config error", e);
        }

        const bbsScreen = document.getElementById('bbs-screen');
        const portfolio = document.querySelector('.portfolio-screen');
        const bbsMessages = document.getElementById('bbs-messages');
        const bbsNameInput = document.getElementById('bbs-name');
        const bbsContentInput = document.getElementById('bbs-content');
        const bbsAnonCheck = document.getElementById('bbs-anon');

        const artScreen = document.getElementById('art-screen');
        const artGrid = document.getElementById('art-grid');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        const artFiles = ['1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg', '6.jpg', '7.jpg'];
        let currentArtIndex = 0;

        function toggleArt(show) {
            if (show) {
                if (typeof bbsScreen !== 'undefined') bbsScreen.style.display = 'none'; // Ensure BBS is closed
                artScreen.style.display = 'flex';
                portfolio.style.opacity = '0.3';
                portfolio.style.pointerEvents = 'none';
                loadGallery();
            } else {
                artScreen.style.display = 'none';
                portfolio.style.opacity = '1';
                portfolio.style.pointerEvents = 'all';
            }
        }

        function loadGallery() {
            artGrid.innerHTML = '';
            artFiles.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'art-item';
                const fullPath = `./art/${file}`;
                
                // Elegant staggered entry
                item.style.animationDelay = `${(index * 0.15)}s`;
                
                item.onclick = () => openLightbox(index);
                
                const size = Math.floor(Math.random() * 500 + 200) + 'KB';
                const id = 'ARTIFACT_' + (index + 1).toString().padStart(3, '0');
                
                item.innerHTML = `
                    <div style="transform-style: preserve-3d;">
                        <img src="${fullPath}" alt="Artwork ${index + 1}">
                    </div>
                `;
                artGrid.appendChild(item);
            });
        }

        function openLightbox(index) {
            currentArtIndex = index;
            const src = `./art/${artFiles[currentArtIndex]}`;
            lightboxImg.src = src;
            lightbox.style.display = 'flex';
            // Disable background scroll if needed, though this is absolute on top
        }

        function navigateArt(e, direction) {
            if (e) e.stopPropagation();
            currentArtIndex += direction;
            if (currentArtIndex >= artFiles.length) currentArtIndex = 0;
            if (currentArtIndex < 0) currentArtIndex = artFiles.length - 1;
            
            const src = `./art/${artFiles[currentArtIndex]}`;
            // Use a slight fade out/in effect for the image transition if desired
            lightboxImg.style.opacity = '0';
            setTimeout(() => {
                lightboxImg.src = src;
                lightboxImg.style.opacity = '1';
            }, 100);
        }

        function closeLightbox(e) {
            if (e) e.stopPropagation();
            lightbox.style.display = 'none';
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (lightbox.style.display === 'flex') {
                if (e.key === 'ArrowRight') navigateArt(null, 1);
                if (e.key === 'ArrowLeft') navigateArt(null, -1);
                if (e.key === 'Escape') closeLightbox();
            }
        });

        let userId = localStorage.getItem('wired_user_id');
        if (!userId) {
            userId = 'usr_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('wired_user_id', userId);
        }

        const isAdmin = () => localStorage.getItem('wired_admin') === 'true';

        async function toggleBBS(show) {
            if (show) {
                if (typeof artScreen !== 'undefined') artScreen.style.display = 'none'; // Ensure Art is closed
                bbsScreen.style.display = 'flex';
                portfolio.style.opacity = '0.3';
                portfolio.style.pointerEvents = 'none';
                await loadMessages();
                setupRealtime();
            } else {
                bbsScreen.style.display = 'none';
                portfolio.style.opacity = '1';
                portfolio.style.pointerEvents = 'all';
            }
        }

        function handleAnon(el) {
            if (el.checked) {
                bbsNameInput.value = '';
                bbsNameInput.disabled = true;
                bbsNameInput.placeholder = 'ANONYMOUS';
            } else {
                bbsNameInput.disabled = false;
                bbsNameInput.placeholder = 'NAME...';
            }
        }

        async function loadMessages() {
            if (!_supabase) {
                bbsMessages.innerHTML = `<div style="color: #ff4d4d; font-size: 0.8rem; padding: 1rem;">[ SYSTEM ERROR: SUPABASE CLIENT NOT INITIALIZED ]</div>`;
                return;
            }
            
            const { data: messages, error } = await _supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true });

            if (error) {
                console.error('Supabase Error:', error);
                bbsMessages.innerHTML = `
                    <div style="color: #ff4d4d; font-size: 0.8rem; padding: 1rem;">
                        [ CONNECTION ERROR ]<br>
                        CODE: ${error.code}<br>
                        MSG: ${error.message}<br><br>
                        * 請檢查是否已在 Supabase 創建 'messages' 表，並關閉 RLS 或添加權限項目。
                    </div>`;
                return;
            }

            bbsMessages.innerHTML = '';
            if (!messages || messages.length === 0) {
                bbsMessages.innerHTML = '<div style="color: #495945; font-size: 0.9rem; padding: 1rem;">[ SYSTEM: NO CONNECTIONS FOUND. (資料庫為空) ]</div>';
                return;
            }

            messages.forEach((msg) => {
                const isAuthor = msg.sender_id === userId || isAdmin();
                const item = document.createElement('div');
                item.className = 'message-item';
                let controlsHtml = '';
                if (isAuthor) {
                    controlsHtml = `
                        <div class="msg-dot" onclick="toggleControls(event, this)"></div>
                        <div class="msg-controls">
                            <button class="ctrl-btn" onclick="startEdit('${msg.id}')">[ EDIT ]</button>
                            <button class="ctrl-btn" onclick="deleteMessage('${msg.id}')">[ DELETE ]</button>
                        </div>
                    `;
                }
                const d = new Date(msg.created_at);
                const timeStr = `${d.getFullYear()}.${(d.getMonth() + 1).toString().padStart(2, '0')}.${d.getDate().toString().padStart(2, '0')} ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;

                item.innerHTML = `
                    ${controlsHtml}
                    <div class="message-meta"><span># ${msg.name}</span><span>@ ${timeStr}${msg.is_edited ? ' (EDITED)' : ''}</span></div>
                    <div class="message-content" id="msg-content-${msg.id}">${msg.content}</div>
                `;
                bbsMessages.appendChild(item);
            });
            bbsMessages.scrollTop = bbsMessages.scrollHeight;
        }

        let channel;
        function setupRealtime() {
            if (channel || !_supabase) return;
            channel = _supabase.channel('public:messages')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => {
                    loadMessages();
                })
                .subscribe();
        }

        function toggleControls(e, dot) {
            e.stopPropagation();
            const controls = dot.nextElementSibling;
            document.querySelectorAll('.msg-controls').forEach(c => { if (c !== controls) c.style.display = 'none'; });
            controls.style.display = controls.style.display === 'flex' ? 'none' : 'flex';
        }

        document.addEventListener('click', () => {
            document.querySelectorAll('.msg-controls').forEach(c => c.style.display = 'none');
        });

        async function postMessage() {
            if (!_supabase) return;
            const content = bbsContentInput.value.trim();
            if (!content) return;
            let name = bbsNameInput.value.trim();
            if (bbsAnonCheck.checked || !name) name = 'ANONYMOUS';

            const { error } = await _supabase
                .from('messages')
                .insert([{ sender_id: userId, name: name, content: content }]);

            if (error) {
                alert('[ ERROR: FAILED TO CONNECT ]');
            } else {
                bbsContentInput.value = '';
                await loadMessages(); // 立即本地重新整理，提升自己發送時的體驗
            }
        }

        async function deleteMessage(id) {
            if (!confirm('[ WARNING: TERMINATE CONNECTION? ]') || !_supabase) return;
            await _supabase.from('messages').delete().eq('id', id);
        }

        async function startEdit(id) {
            const container = document.getElementById(`msg-content-${id}`);
            const originalContent = container.innerText;
            container.innerHTML = `
                <textarea class="edit-area" id="edit-box-${id}">${originalContent}</textarea>
                <div style="display:flex; gap:0.5rem; margin-top:0.5rem; justify-content: flex-end;">
                    <button class="ctrl-btn" onclick="saveEdit('${id}')">[ SAVE ]</button>
                    <button class="ctrl-btn" onclick="loadMessages()">[ CANCEL ]</button>
                </div>
            `;
        }

        async function saveEdit(id) {
            if (!_supabase) return;
            const newContent = document.getElementById(`edit-box-${id}`).value.trim();
            if (!newContent) return;
            await _supabase.from('messages').update({ content: newContent, is_edited: true }).eq('id', id);
            await loadMessages();
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.location.hash === '#skip') {
                const welcome = document.getElementById('welcome-sequence');
                const portfolioScreen = document.querySelector('.portfolio-screen');
                if (welcome) { welcome.style.display = 'none'; }
                if (portfolioScreen) { portfolioScreen.style.opacity = '1'; }
            }
        });
    </script>
</body>

</html>
