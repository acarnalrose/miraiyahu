<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Disconnecting...</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: "Noto Serif JP", "MS Mincho", "Mincho", serif;
        }

        /* Pure black and white TV Static */
        .static-layer {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 1;
            z-index: 1;
            pointer-events: none;
            filter: grayscale(1) contrast(3) brightness(1.5);
            animation: staticNoise 0.08s infinite;
        }

        /* Distortion wrapper */
        .distort-wrapper {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            animation: twitch 2s infinite steps(1);
            pointer-events: none;
        }

        @keyframes staticNoise {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-5%, 5%); }
            40% { transform: translate(5%, -5%); }
            60% { transform: translate(-2%, -2%); }
            80% { transform: translate(2%, 2%); }
            100% { transform: translate(0, 0); }
        }

        @keyframes twitch {
            0% { transform: skewX(0deg) scale(1); }
            5% { transform: skewX(-15deg) scale(1.1); }
            10% { transform: skewX(10deg) scale(1.05); }
            15% { transform: skewX(-5deg) scale(1); }
            20% { transform: skewX(0deg) scale(1); }
            100% { transform: skewX(0deg); }
        }

        .text-container {
            position: absolute;
            right: 15%;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            color: #000;
            font-size: 3rem;
            writing-mode: vertical-rl;
            letter-spacing: 1.5em;
            text-shadow: 
                0 0 3px rgba(0, 0, 0, 0.5);
            opacity: 0;
            animation: textFadeIn 2s 0.5s ease-in-out forwards;
            font-weight: bold;
            height: 80vh;
            display: flex;
            align-items: center;
        }

        @keyframes textFadeIn {
            0% { opacity: 0; filter: blur(15px); }
            100% { opacity: 1; filter: blur(0px); }
        }

        /* CRT Shutdown overlay — two black bars closing from top and bottom */
        .crt-shutdown {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
        }

        .crt-shutdown.active {
            opacity: 1;
        }

        .crt-bar-top, .crt-bar-bottom {
            position: absolute;
            left: 0;
            width: 100%;
            height: 0%;
            background: #000;
            z-index: 100;
            transition: height 0.6s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .crt-bar-top {
            top: 0;
        }

        .crt-bar-bottom {
            bottom: 0;
        }

        .crt-shutdown.active .crt-bar-top,
        .crt-shutdown.active .crt-bar-bottom {
            height: 50%;
        }

        /* The bright horizontal line in the middle */
        .crt-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: #fff;
            z-index: 101;
            transform: translateY(-50%);
            opacity: 0;
            box-shadow: 0 0 15px #fff, 0 0 30px #fff;
            transition: opacity 0.3s ease 0.5s, width 0.4s ease 0.8s, left 0.4s ease 0.8s;
        }

        .crt-shutdown.active .crt-line {
            opacity: 1;
        }

        .crt-shutdown.shrink .crt-line {
            width: 0%;
            left: 50%;
            opacity: 0;
        }

        @media (max-width: 768px) {
            .text-container {
                font-size: 1.8rem;
                right: 10%;
                letter-spacing: 1em;
            }
        }
    </style>
</head>

<body>
    <div class="distort-wrapper">
        <div class="static-layer"></div>
    </div>
    
    <div class="text-container">
        現実に在るものだけが、真実ではない
    </div>
    
    <div class="crt-shutdown" id="crt">
        <div class="crt-bar-top"></div>
        <div class="crt-bar-bottom"></div>
        <div class="crt-line"></div>
    </div>

    <script>
        setTimeout(() => {
            const crt = document.getElementById('crt');
            crt.classList.add('active');
            // After bars close, shrink the line
            setTimeout(() => {
                crt.classList.add('shrink');
            }, 700);
            // After line shrinks, redirect
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }, 5000);
    </script>
</body>

</html>
