<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Disconnecting...</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: "Noto Serif JP", "MS Mincho", "Mincho", serif;
        }

        /* Pure black and white TV Static overlay */
        .static-layer {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 1;
            z-index: 1;
            pointer-events: none;
            filter: grayscale(1) contrast(3) brightness(1.5);
            animation: staticNoise 0.08s infinite;
        }

        /* Distortion wrapper */
        .distort-wrapper {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            animation: twitch 2s infinite steps(1);
            pointer-events: none;
        }

        @keyframes staticNoise {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-5%, 5%); }
            40% { transform: translate(5%, -5%); }
            60% { transform: translate(-2%, -2%); }
            80% { transform: translate(2%, 2%); }
            100% { transform: translate(0, 0); }
        }

        @keyframes twitch {
            0% { transform: skewX(0deg) scale(1); }
            5% { transform: skewX(-15deg) scale(1.1); }
            10% { transform: skewX(10deg) scale(1.05); }
            15% { transform: skewX(-5deg) scale(1); }
            20% { transform: skewX(0deg) scale(1); }
            100% { transform: skewX(0deg); }
        }

        .text-container {
            position: absolute;
            right: 15%;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            color: #fff;
            font-size: 3rem;
            writing-mode: vertical-rl;
            letter-spacing: 1.5em; /* Scattered text */
            text-shadow: 
                0 0 10px rgba(0, 0, 0, 1),
                0 0 20px rgba(0, 0, 0, 1),
                0 0 30px rgba(255, 255, 255, 0.8);
            opacity: 0;
            animation: textFadeIn 2s 0.5s ease-in-out forwards;
            font-weight: bold;
            mix-blend-mode: difference;
            height: 80vh; /* Allow vertical spreading */
            display: flex;
            align-items: center;
        }

        @keyframes textFadeIn {
            0% { opacity: 0; filter: blur(15px); }
            100% { opacity: 1; filter: blur(0px); }
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            opacity: 0;
            z-index: 50;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        @media (max-width: 768px) {
            .text-container {
                font-size: 1.8rem;
                right: 10%;
                letter-spacing: 1em;
            }
        }
    </style>
</head>

<body>
    <div class="distort-wrapper">
        <div class="static-layer"></div>
    </div>
    
    <div class="text-container">
        現実に在るものだけが、真実ではない
    </div>
    
    <div class="overlay" id="flash"></div>

    <script>
        setTimeout(() => {
            const flash = document.getElementById('flash');
            flash.style.opacity = '1';
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500);
        }, 5000); // 5 seconds animation then redirect
    </script>
</body>

</html>
