<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Disconnecting...</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Noto Serif JP", "MS Mincho", "Mincho", serif;
        }

        .lsd-background {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                #ff003c, #ff8a00, #e52e71, #9b00e8, #00f0ff, #00ff66, #ff003c
            );
            background-size: 300% 300%;
            filter: blur(8px) contrast(150%) saturate(200%);
            z-index: 1;
            opacity: 0;
            animation: 
                fadein 2s forwards, 
                lsd-pan 6s linear infinite, 
                spin 25s linear infinite;
        }

        @keyframes fadein {
            0% { opacity: 0; }
            100% { opacity: 0.85; }
        }

        @keyframes lsd-pan {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .noise {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.15;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        .text-container {
            position: relative;
            z-index: 10;
            color: #fff;
            font-size: 3.5rem;
            writing-mode: vertical-rl;
            letter-spacing: 0.3em;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.8), 
                0 0 20px rgba(255, 0, 128, 0.8),
                0 0 40px rgba(0, 255, 255, 0.8),
                3px 3px 0px #000;
            opacity: 0;
            animation: textFadeIn 2.5s 0.5s ease-in-out forwards;
            font-weight: bold;
            mix-blend-mode: difference;
        }

        @keyframes textFadeIn {
            0% { opacity: 0; filter: blur(20px); transform: scale(1.1); }
            100% { opacity: 1; filter: blur(0px); transform: scale(1); }
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            opacity: 0;
            z-index: 50;
            pointer-events: none;
            transition: opacity 1.5s ease;
        }
        
        @media (max-width: 768px) {
            .text-container {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="lsd-background"></div>
    <div class="noise"></div>
    <div class="text-container">
        現実に在るものだけが、真実ではない
    </div>
    <div class="overlay" id="flash"></div>

    <script>
        setTimeout(() => {
            const flash = document.getElementById('flash');
            flash.style.opacity = '1';
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }, 5000); // 5 seconds animation then redirect
    </script>
</body>

</html>
