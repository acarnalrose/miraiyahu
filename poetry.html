<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Miraiyahu | 詩歌隨筆</title>
    <style>

        :root {
            --x: 50%;
            --y: 50%;
            --border-color: #E0E0E0;
            --text-color: #d1ccb8;
            --bg-glass: rgba(10, 8, 5, 0.9);
            --accent: #E0E0E0;
        }

        body {
            background-color: #1a1510;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: serif;
            overflow: hidden;
            position: relative;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('wired-bg.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.5;
            z-index: 1;
            filter: sepia(50%) contrast(120%) brightness(50%);
            pointer-events: none;
        }

        .noise-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: repeating-radial-gradient(circle at center, rgba(10, 10, 10, 0.2) 0, transparent 2px);
            pointer-events: none;
            filter: contrast(150%) brightness(120%) sepia(30%);
            opacity: 0.4;
            z-index: 2;
        }

        .scanlines {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(20, 20, 20, 0.4) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
        }

        .frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(255, 255, 255, 0.1), inset 0 0 3px rgba(100, 100, 100, 0.5);
            border: 2px solid rgba(50, 50, 50, 0.8);
            box-sizing: border-box;
        }

        .workspace {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-glass);
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            animation: bootUp 1s ease-out forwards;
        }

        @keyframes bootUp {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .header { padding: 3rem; border-bottom: 2px double var(--border-color); background: rgba(0, 0, 0, 0.5); display: flex; justify-content: space-between; align-items: center; }
        .title { font-size: 4rem; margin: 0; letter-spacing: 1rem; color: #8c7e6b; text-shadow: 0 0 15px rgba(224, 224, 224, 0.2); }
        .category-header { font-size: 1.5rem; margin: 2rem 0; color: #8c7e6b; letter-spacing: 0.5rem; border-left: 4px solid var(--border-color); padding-left: 1rem; font-family: 'Courier New', Courier, monospace; }
        .section-container { margin-bottom: 4rem; }
        .poem-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; padding-bottom: 1rem; }
        .poem-card { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(140, 126, 107, 0.3); padding: 2rem; text-decoration: none; color: var(--text-color); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 0.5rem; }
        .poem-card:hover { background: rgba(224, 224, 224, 0.05); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(224, 224, 224, 0.2); border-color: #E0E0E0; }
        .poem-num { font-family: 'Courier New'; font-size: 0.8rem; color: #8c7e6b; opacity: 0.7; }
        .poem-title { font-size: 1.2rem; letter-spacing: 0.1rem; }
        .back-btn { display: flex; align-items: center; justify-content: center; height: 3rem; padding: 0 2rem; background: linear-gradient(135deg, #495945 0%, #2c2416 100%); color: #d1ccb8; border: 2px outset #7a8c73; text-decoration: none; font-family: 'Courier New', monospace; font-weight: bold; transition: all 0.1s; }
        .back-btn:active { transform: translate(1px, 1px); border-style: inset; }
        .scroll-container { overflow-y: auto; flex-grow: 1; padding: 0 4rem; }
        .cursor-light { position: absolute; width: 40vw; height: 40vw; background: radial-gradient(circle at var(--x) var(--y), rgba(209, 204, 184, 0.15) 0%, transparent 50%); pointer-events: none; mix-blend-mode: overlay; z-index: 3; top: 0; left: 0; }

    </style>
</head>
<body>

    </div>
    <script>
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth * 100) + '%';
            const y = (e.clientY / window.innerHeight * 100) + '%';
            document.documentElement.style.setProperty('--x', x);
            document.documentElement.style.setProperty('--y', y);
        });
    </script>
